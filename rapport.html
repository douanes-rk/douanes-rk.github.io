<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Douanes RK — Rapport</title>
  <style>
    body {
      background: #D5BC84;
      color: #7A451E;
      font-family: Georgia, serif;
      margin: 0;
      padding: 0;
    }
    header {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .6rem .8rem;
      background: #00000012;
      flex-wrap: wrap;
    }
    .site-title {
      font-weight: bold;
      font-size: 1.1rem;
    }
    header a {
      color: #7A451E;
      text-decoration: none;
      cursor: pointer;
    }
    header a:hover {
      text-decoration: underline;
    }
    main {
      padding: 1rem 2rem;
      max-width: 900px;
      margin: 0;
    }
    footer {
      margin-top: 2rem;
      border-top: 1px solid #7A451E55;
      padding: .5rem 1rem;
      font-size: .9rem;
    }
    h1 {
      margin-bottom: .5rem;
    }
    .form-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .8rem;
      margin-bottom: 1rem;
    }
    .form-group strong {
      min-width: 260px;
    }
    .villages-list {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin-bottom: 1rem;
    }
    .villages-list label {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: .35rem;
      margin-bottom: 1rem;
    }
    .field-group label {
      font-weight: bold;
    }
    textarea {
      width: 100%;
      padding: .5rem;
      border: 1px solid #7A451E55;
      border-radius: 4px;
      background: #fff8ee;
      font-family: Georgia, serif;
      font-size: .95rem;
      box-sizing: border-box;
      resize: vertical;
    }
    .btn {
      background: #7A451E;
      color: white;
      border: none;
      padding: .5rem 1.5rem;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      font-family: Georgia, serif;
    }
    .btn:hover {
      background: #5a3210;
    }
    .error-msg {
      color: #c00;
      background: #fdd;
      border: 1px solid #c00;
      padding: .4rem .8rem;
      border-radius: 4px;
      margin-bottom: .8rem;
      display: none;
    }
    .success-section {
      display: none;
    }
    .bbcode-result {
      width: 100%;
      height: 400px;
      padding: .5rem;
      border: 1px solid #7A451E55;
      border-radius: 4px;
      background: #fff8ee;
      font-family: monospace;
      font-size: .9rem;
      box-sizing: border-box;
      resize: vertical;
    }
    .btn-copy {
      background: #5a3e2b;
      color: white;
      border: none;
      padding: .5rem 1.5rem;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: .5rem;
    }
    .btn-copy:hover {
      background: #7a543a;
    }
    .village-disabled {
      color: #aaa;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <header>
    <span class="site-title">Les Douanes RK</span>
    <span id="blason-container"></span>
    &nbsp;|&nbsp;
    <span id="nav-links"></span>
    &nbsp;|&nbsp;
    <a href="#" onclick="seDeconnecter(); return false;">🚪 Déconnexion</a>
  </header>

  <main>
    <!-- Formulaire -->
    <div id="form-section">
      <h1>Déposer un rapport</h1>
      <div id="error-msg" class="error-msg"></div>

      <!-- Garde effectuée -->
      <div class="form-group">
        <strong>Vous avez effectué votre garde :</strong>
        <label><input type="radio" name="tour_de_garde" value="oui"> Oui</label>
        <label><input type="radio" name="tour_de_garde" value="non"> Non</label>
      </div>

      <!-- Villages -->
      <div>
        <div style="margin-bottom:.4rem"><strong>Vous l'avez faite dans le village de :</strong></div>
        <div class="villages-list" id="villages-list"></div>
      </div>

      <!-- Visions -->
      <div class="field-group">
        <label for="mem_visions">Vos visions et évènements :</label>
        <textarea id="mem_visions" rows="7"></textarea>
      </div>

      <!-- Villageois -->
      <div class="field-group">
        <label for="villagers">Liste des villageois recensés en mairie :</label>
        <textarea id="villagers" rows="7"></textarea>
      </div>

      <!-- Armées -->
      <div class="field-group">
        <label for="armies_groups">Armées et groupes présents hors de la ville :</label>
        <textarea id="armies_groups" rows="7"></textarea>
      </div>

      <button class="btn" onclick="genererRapport()">Générer le rapport</button>
    </div>

    <!-- Résultat -->
    <div id="success-section" class="success-section">
      <h2>Rapport généré</h2>
      <p id="rapport-info"></p>
      <textarea class="bbcode-result" id="bbcode-result" readonly></textarea>
      <br>
      <button class="btn-copy" onclick="copierBBCode()">📋 Copier le BBCode</button>
      <br><br>
      <button class="btn" onclick="nouveauRapport()">Nouveau rapport</button>
    </div>
  </main>

  <footer>
    Pour toute information ou problème, contactez IG : Agatha.isabella
  </footer>

  <script>
    const SUPABASE_URL = 'https://zmntjyrognblxzipjohl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptbnRqeXJvZ25ibHh6aXBqb2hsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjY1ODAsImV4cCI6MjA5NDAwMjU4MH0.oEw5q44RL7x2P9Wr6eDr-vEoIUpNBrAJAzqWAVvnEJ4';
    const REPORT_TITLE_COLOR = '#162E5A';

    // Vérifier connexion
    const userJson = localStorage.getItem('rk_user');
    if (!userJson) window.location.href = 'index.html';
    const user = JSON.parse(userJson);

    // Blason
    if (user.bureau === 'Armagnac & Comminges') {
      document.getElementById('blason-container').innerHTML =
        '<img src="https://nsm09.casimages.com/img/2025/09/21//iHraVb-Etendard-AC.png" height="48" alt="Blason A&C">';
    }

    // Navigation
    const navLinks = document.getElementById('nav-links');
    if (user.role === 'superadmin' || user.role === 'prevot') {
      navLinks.innerHTML = '<a href="dashboard.html">Tableau de bord</a> | <a href="rapport.html">📜 Rapport</a>';
    } else {
      navLinks.innerHTML = '<a href="rapport.html">📜 Rapport</a>';
    }

    // Charger les villages
    async function chargerVillages() {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/villages?bureau=eq.${encodeURIComponent(user.bureau)}&order=name`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const villages = await response.json();

      // Charger rapports du jour
      const today = new Date().toISOString().split('T')[0];
      const respRapports = await fetch(`${SUPABASE_URL}/rest/v1/reports?report_date=eq.${today}&bureau=eq.${encodeURIComponent(user.bureau)}&select=village`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const rapportsDuJour = await respRapports.json();
      const villagesTraites = rapportsDuJour.map(r => r.village);

      const container = document.getElementById('villages-list');
      villages.forEach(v => {
        const disabled = villagesTraites.includes(v.name);
        const label = document.createElement('label');
        if (disabled) label.classList.add('village-disabled');
        label.innerHTML = `<input type="radio" name="village" value="${v.name}" ${disabled ? 'disabled' : ''}> ${v.name}`;
        container.appendChild(label);
      });
    }

    chargerVillages();

    // Générer le rapport
    async function genererRapport() {
      const errorMsg = document.getElementById('error-msg');
      errorMsg.style.display = 'none';

      const garde = document.querySelector('input[name="tour_de_garde"]:checked');
      const village = document.querySelector('input[name="village"]:checked');
      const memVisions = document.getElementById('mem_visions').value.trim();
      const villagers = document.getElementById('villagers').value.trim();
      const armiesGroups = document.getElementById('armies_groups').value.trim();

      // Validation
      if (!garde) {
        errorMsg.textContent = "Indiquez si la garde a été effectuée.";
        errorMsg.style.display = 'block';
        return;
      }
      if (!village) {
        errorMsg.textContent = "Choisissez un village.";
        errorMsg.style.display = 'block';
        return;
      }
      if (!villagers) {
        errorMsg.textContent = "Renseignez la liste des villageois.";
        errorMsg.style.display = 'block';
        return;
      }
      if (!armiesGroups) {
        errorMsg.textContent = "Renseignez les armées et groupes.";
        errorMsg.style.display = 'block';
        return;
      }

      const maintenant = new Date();
      const heure = maintenant.getHours();
      const today = heure < 5 ? new Date(maintenant - 86400000) : maintenant;
      if (heure >= 4 && heure < 6) {
        errorMsg.textContent = "Dépôt de rapports bloqué pendant la mise à jour du jeu (4h-5h30).";
        errorMsg.style.display = 'block';
        return;
      }
      const anneeIG = today.getFullYear() - 552;
      const dateStr = today.toLocaleDateString('fr-FR', { day: '2-digit', month: 'long' }) + ' ' + anneeIG;
      const tourDeGarde = garde.value === 'oui';

      let mv = memVisions;
      if (tourDeGarde && !mv) mv = '[b]RAS.[/b]';
      if (!tourDeGarde && !mv) mv = 'Tour de garde non effectué (autres données fournies).';

      // Générer BBCode
      const bbcode = genererBBCode(village.value, dateStr, mv, villagers, armiesGroups);

      // Sauvegarder en base
      const reportDate = today.toISOString().split('T')[0];
      await fetch(`${SUPABASE_URL}/rest/v1/reports`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          report_date: reportDate,
          user_id: user.id,
          village: village.value,
          bureau: user.bureau,
          tour_de_garde: tourDeGarde,
          mem_visions: mv,
          armies_groups: armiesGroups,
          villagers: villagers,
          bbcode: bbcode
        })
      });

      // Afficher résultat
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('success-section').style.display = 'block';
      document.getElementById('rapport-info').textContent = `Village : ${village.value} — Date : ${dateStr}`;
      document.getElementById('bbcode-result').value = bbcode;
    }

    function genererBBCode(village, dateStr, memVisions, villagers, armiesGroups) {
      const c = REPORT_TITLE_COLOR;
      const title = (label, count) => {
        const suffix = count !== undefined ? ` [color=blue][b]${count}[/b][/color]` : '';
        return `[color=${c}][size=14][b][u]${label}[/u] :[/b][/size][/color]${suffix}\n`;
      };

      const countLines = txt => (txt || '').split('\n').filter(l => l.trim()).length;

      let bb = `[quote][center][b][size=18]${village}[/size]\nRapport de la maréchaussée du ${dateStr}.[/b][/center]\n`;
      bb += title('MÉMOIRE ET VISIONS');
      bb += memVisions + '\n\n';
      bb += title('PERSONNES EN SURVEILLANCE', countLines(''));
      bb += '[b]RAS.[/b]\n\n';
      bb += title('FLUX MIGRATOIRES', 0);
      bb += '[b]RAS.[/b]\n\n';
      bb += title('PRÉSENCES ÉTRANGÈRES', 0);
      bb += '[b]RAS.[/b]\n\n';
      bb += title('PRÉSENCES ARMAGNACAISES & COMMINGEOISES', 0);
      bb += '[b]RAS.[/b]\n\n';
      bb += title('ARMÉES ET GROUPES', countLines(armiesGroups));
      bb += (armiesGroups || '[b]RAS.[/b]') + '\n\n';
      bb += title('LISTE DES VILLAGEOIS & DÉMÉNAGEMENTS');
      bb += `[spoiler][quote]Déménagements[/quote]\n${villagers}\n[/spoiler]\n\n`;
      bb += `[quote][size=9][b]LÉGENDE[/b] :\n[color=red][b]Rouge[/b][/color] : Surveillance accrue.\n[color=darkred][b]DarkRed[/b][/color] : Surveillance légère.\n[color=green][b]Vert[/b][/color] : Sans antécédent judiciaire.\n[color=indigo][b]PNG[/b][/color] : Persona Non Grata.[/size][/quote]`;
      bb += '\n[/quote]';
      return bb;
    }

    function copierBBCode() {
      const textarea = document.getElementById('bbcode-result');
      textarea.select();
      document.execCommand('copy');
      alert('BBCode copié !');
    }

    function nouveauRapport() {
      document.getElementById('form-section').style.display = 'block';
      document.getElementById('success-section').style.display = 'none';
      document.getElementById('mem_visions').value = '';
      document.getElementById('villagers').value = '';
      document.getElementById('armies_groups').value = '';
      document.querySelectorAll('input[name="tour_de_garde"]').forEach(r => r.checked = false);
      document.querySelectorAll('input[name="village"]').forEach(r => r.checked = false);
      chargerVillages();
    }

    function seDeconnecter() {
      localStorage.removeItem('rk_user');
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
